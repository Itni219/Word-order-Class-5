<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sentence Order Game – Class 5 English</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #1D9E75; --teal-dark: #0F6E56; --teal-light: #E1F5EE;
    --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #0C447C;
    --red: #E24B4A; --red-light: #FCEBEB; --red-dark: #A32D2D;
    --amber: #EF9F27; --amber-light: #FAEEDA; --amber-dark: #854F0B;
    --gray: #888780; --gray-light: #F1EFE8; --gray-dark: #2C2C2A;
    --bg: #ffffff; --surface: #f5f5f3; --border: rgba(0,0,0,0.12);
    --text: #1a1a18; --muted: #5f5e5a;
    --radius: 10px; --radius-lg: 14px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
  .screen.active { display: flex; }

  /* ── REGISTER ── */
  #screen-register { gap: 1.25rem; }
  .logo { font-size: 28px; font-weight: 700; color: var(--teal); letter-spacing: -0.5px; }
  .logo span { color: var(--text); font-weight: 400; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 440px; }
  .card h2 { font-size: 17px; font-weight: 600; margin-bottom: 1rem; }
  .field { margin-bottom: 0.75rem; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .field input { width: 100%; padding: 12px 14px; font-size: 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none; -webkit-appearance: none; }
  .field input:focus { border-color: var(--teal); background: #fff; }
  .btn { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: var(--radius); cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--teal); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); font-weight: 500; }
  .note { font-size: 13px; color: var(--muted); text-align: center; max-width: 340px; }

  /* ── GAME ── */
  #screen-game { justify-content: flex-start; padding: 0; }
  #game-inner { width: 100%; max-width: 520px; margin: 0 auto; padding: 1rem 1rem 2rem; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .pair-name { font-size: 14px; font-weight: 600; color: var(--teal); }
  .score-pill { background: var(--teal-light); color: var(--teal-dark); border-radius: 20px; padding: 4px 12px; font-size: 14px; font-weight: 600; }
  .progress-text { font-size: 12px; color: var(--muted); }

  .timer-wrap { height: 6px; background: var(--surface); border-radius: 3px; margin-bottom: 1rem; overflow: hidden; }
  .timer-bar { height: 6px; width: 100%; border-radius: 3px; transition: width 0.1s linear, background 0.4s; }

  .q-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 0.75rem; }
  .q-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.6rem; }
  .drop-zone { display: flex; flex-wrap: wrap; gap: 7px; min-height: 52px; padding: 10px; background: var(--surface); border-radius: var(--radius); border: 1.5px dashed var(--border); }
  .drop-zone.filled { border-style: solid; border-color: var(--teal); }

  .word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }

  .tile { padding: 11px 15px; border-radius: var(--radius); font-size: 16px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
  .tile:active { transform: scale(0.95); }
  .tile-bank { background: var(--blue-light); border: 1px solid #85B7EB; color: var(--blue-dark); }
  .tile-placed { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
  .tile-hidden { visibility: hidden; }

  .game-btns { display: flex; gap: 8px; margin-bottom: 0.75rem; }
  .game-btns .btn { flex: 1; padding: 13px; font-size: 15px; }

  .feedback { padding: 12px 14px; border-radius: var(--radius); font-size: 15px; margin-bottom: 0.75rem; display: none; }
  .feedback.correct { background: #EAF3DE; color: #3B6D11; border: 1px solid #97C459; }
  .feedback.wrong { background: var(--red-light); color: var(--red-dark); border: 1px solid #F09595; }
  .feedback.timeout { background: var(--amber-light); color: var(--amber-dark); border: 1px solid #FAC775; }
  .streak-badge { display: inline-block; background: var(--amber-light); color: var(--amber-dark); border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; margin-top: 4px; }

  /* ── LEADERBOARD ── */
  #screen-board { justify-content: flex-start; padding: 1rem; }
  #board-inner { width: 100%; max-width: 480px; margin: 0 auto; }
  .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .board-title { font-size: 20px; font-weight: 700; }
  .board-refresh { font-size: 13px; color: var(--teal); cursor: pointer; padding: 6px 10px; }
  .board-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius); margin-bottom: 6px; background: var(--surface); border: 1px solid var(--border); }
  .board-row.me { background: var(--teal-light); border-color: #9FE1CB; }
  .board-rank { width: 28px; font-size: 16px; font-weight: 700; color: var(--muted); text-align: center; }
  .board-rank.gold { color: #BA7517; }
  .board-rank.silver { color: #888780; }
  .board-rank.bronze { color: #854F0B; }
  .board-pair { flex: 1; font-size: 15px; font-weight: 500; }
  .board-pts { font-size: 15px; font-weight: 700; color: var(--teal-dark); }
  .board-done { font-size: 11px; color: var(--muted); }
  .empty-board { text-align: center; color: var(--muted); padding: 2rem; font-size: 15px; }

  /* ── FINISH ── */
  #screen-finish { gap: 1rem; }
  .finish-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem 1.5rem; width: 100%; max-width: 400px; text-align: center; }
  .finish-emoji { font-size: 48px; margin-bottom: 0.5rem; }
  .finish-title { font-size: 22px; font-weight: 700; margin-bottom: 0.25rem; }
  .finish-sub { font-size: 15px; color: var(--muted); margin-bottom: 1.25rem; }
  .finish-score { font-size: 40px; font-weight: 800; color: var(--teal); margin-bottom: 0.25rem; }
  .finish-max { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
  .finish-btns { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>

<!-- REGISTER -->
<div id="screen-register" class="screen active">
  <div class="logo">Word<span>Order</span></div>
  <div class="card">
    <h2>Enter your names</h2>
    <div class="field">
      <label>Student 1 first name</label>
      <input type="text" id="name1" placeholder="e.g. Anna" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Student 2 first name</label>
      <input type="text" id="name2" placeholder="e.g. Ben" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="btn btn-primary" onclick="startGame()" style="margin-top:0.5rem">Start playing</button>
  </div>
  <p class="note">Each pair enters their names and plays on their own iPad. A shared leaderboard shows all pairs.</p>
  <button class="btn btn-secondary" style="max-width:440px;margin-top:0.25rem" onclick="showBoard()">View leaderboard</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div id="game-inner">
    <div class="top-bar">
      <div>
        <div class="pair-name" id="g-pair"></div>
        <div class="progress-text">Question <span id="g-qnum">1</span> of <span id="g-total">10</span></div>
      </div>
      <div class="score-pill">Score: <span id="g-score">0</span></div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="g-timer"></div></div>
    <div class="q-card">
      <div class="q-label">Put the words in the correct order</div>
      <div class="drop-zone" id="g-drop"></div>
    </div>
    <div class="word-bank" id="g-bank"></div>
    <div class="game-btns">
      <button class="btn btn-secondary" onclick="clearDrop()">Clear</button>
      <button class="btn btn-primary" id="g-btn" onclick="handleBtn()">Check answer</button>
    </div>
    <div class="feedback" id="g-feedback"></div>
    <button class="btn btn-secondary" onclick="showBoard()" style="font-size:13px;padding:10px">View leaderboard</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="screen-board" class="screen">
  <div id="board-inner">
    <div class="board-header">
      <div class="board-title">Leaderboard</div>
      <div class="board-refresh" onclick="loadBoard()">↻ Refresh</div>
    </div>
    <div id="board-list"></div>
    <div style="margin-top:1rem;display:flex;gap:8px;">
      <button class="btn btn-secondary" id="board-back-btn" onclick="backFromBoard()" style="flex:1">Back to game</button>
      <button class="btn btn-secondary" onclick="showRegister()" style="flex:1;font-size:13px">New pair</button>
    </div>
  </div>
</div>

<!-- FINISH -->
<div id="screen-finish" class="screen">
  <div class="finish-card">
    <div class="finish-emoji" id="f-emoji">🎉</div>
    <div class="finish-title" id="f-title">Well done!</div>
    <div class="finish-sub" id="f-pair"></div>
    <div class="finish-score" id="f-score">0</div>
    <div class="finish-max" id="f-max">out of 20 points</div>
    <div class="finish-btns">
      <button class="btn btn-primary" onclick="showBoard()">See leaderboard</button>
      <button class="btn btn-secondary" onclick="showRegister()">New pair</button>
    </div>
  </div>
</div>

<script>
const SENTENCES = [
  { w: ["She", "is", "reading", "a", "book", "now"] },
  { w: ["They", "are", "playing", "football", "in", "the", "garden"] },
  { w: ["He", "is", "helping", "her", "with", "the", "homework"] },
  { w: ["I", "am", "writing", "a", "letter", "to", "him"] },
  { w: ["We", "are", "watching", "them", "dance"] },
  { w: ["She", "is", "calling", "me", "on", "the", "phone"] },
  { w: ["They", "are", "not", "listening", "to", "us"] },
  { w: ["He", "is", "giving", "it", "to", "her"] },
  { w: ["I", "am", "waiting", "for", "them", "outside"] },
  { w: ["We", "are", "showing", "him", "our", "new", "classroom"] },
  { w: ["She", "is", "carrying", "it", "for", "me"] },
  { w: ["They", "are", "talking", "to", "us", "about", "the", "trip"] },
  { w: ["He", "is", "not", "looking", "at", "her"] },
  { w: ["I", "am", "telling", "you", "the", "truth"] },
  { w: ["We", "are", "cooking", "dinner", "for", "them"] },
];

const TOTAL = 10;
const TIME = 22;
const STORAGE_KEY = 'wog_scores_v2';

let pairName = '', myScore = 0, qIdx = 0, questions = [], timerInt = null, timeLeft = 0, answered = false, streak = 0, prevScreen = 'game';

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; }
  return b;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function showRegister() { show('register'); }

function startGame() {
  const n1 = document.getElementById('name1').value.trim();
  const n2 = document.getElementById('name2').value.trim();
  if (!n1 || !n2) { alert('Please enter both names.'); return; }
  pairName = n1 + ' & ' + n2;
  myScore = 0; qIdx = 0; streak = 0;
  questions = shuffle(SENTENCES).slice(0, TOTAL);
  document.getElementById('g-pair').textContent = pairName;
  document.getElementById('g-total').textContent = TOTAL;
  show('game');
  loadQ();
}

function loadQ() {
  answered = false;
  const q = questions[qIdx];
  document.getElementById('g-qnum').textContent = qIdx + 1;
  document.getElementById('g-score').textContent = myScore;
  document.getElementById('g-feedback').style.display = 'none';
  document.getElementById('g-btn').textContent = 'Check answer';
  const drop = document.getElementById('g-drop');
  drop.innerHTML = '';
  drop.classList.remove('filled');
  const bank = document.getElementById('g-bank');
  bank.innerHTML = '';
  shuffle(q.w).forEach(word => {
    const t = makeTile(word, 'bank');
    bank.appendChild(t);
  });
  startTimer();
}

function makeTile(word, type) {
  const t = document.createElement('div');
  t.className = 'tile tile-' + type;
  t.textContent = word;
  t.dataset.word = word;
  if (type === 'bank') t.addEventListener('click', () => tapBank(t));
  else t.addEventListener('click', () => tapPlaced(t));
  return t;
}

function tapBank(tile) {
  if (answered) return;
  tile.classList.add('tile-hidden');
  const drop = document.getElementById('g-drop');
  const placed = makeTile(tile.dataset.word, 'placed');
  placed._origin = tile;
  drop.appendChild(placed);
  drop.classList.add('filled');
}

function tapPlaced(tile) {
  if (answered) return;
  tile._origin.classList.remove('tile-hidden');
  tile.remove();
  const drop = document.getElementById('g-drop');
  if (!drop.querySelector('.tile-placed')) drop.classList.remove('filled');
}

function clearDrop() {
  if (answered) return;
  const drop = document.getElementById('g-drop');
  [...drop.querySelectorAll('.tile-placed')].forEach(t => { t._origin.classList.remove('tile-hidden'); t.remove(); });
  drop.classList.remove('filled');
}

function startTimer() {
  clearInterval(timerInt);
  timeLeft = TIME;
  updateBar();
  timerInt = setInterval(() => {
    timeLeft--;
    updateBar();
    if (timeLeft <= 0) { clearInterval(timerInt); onTimeout(); }
  }, 1000);
}

function updateBar() {
  const bar = document.getElementById('g-timer');
  bar.style.width = (timeLeft / TIME * 100) + '%';
  bar.style.background = timeLeft <= 5 ? '#E24B4A' : timeLeft <= 10 ? '#EF9F27' : '#1D9E75';
}

function onTimeout() {
  if (answered) return;
  answered = true; streak = 0;
  showFeedback('timeout', 'Time\'s up! Correct: ' + questions[qIdx].w.join(' '));
}

function handleBtn() {
  if (answered) { nextQ(); return; }
  clearInterval(timerInt);
  answered = true;
  const placed = [...document.getElementById('g-drop').querySelectorAll('.tile-placed')].map(t => t.dataset.word);
  const correct = questions[qIdx].w;
  const ok = placed.join(' ') === correct.join(' ');
  if (ok) {
    const pts = timeLeft >= 15 ? 3 : timeLeft >= 8 ? 2 : 1;
    myScore += pts;
    streak++;
    document.getElementById('g-score').textContent = myScore;
    const label = pts === 3 ? '+3 pts — super fast!' : pts === 2 ? '+2 pts — well done!' : '+1 pt';
    const streakTxt = streak >= 3 ? '<br><span class="streak-badge">🔥 ' + streak + ' in a row!</span>' : '';
    showFeedback('correct', 'Correct! ' + label + streakTxt);
  } else {
    streak = 0;
    showFeedback('wrong', 'Not quite. Correct: ' + correct.join(' '));
  }
  document.getElementById('g-btn').textContent = qIdx < TOTAL - 1 ? 'Next ›' : 'See results';
}

function showFeedback(type, msg) {
  const fb = document.getElementById('g-feedback');
  fb.className = 'feedback ' + type;
  fb.innerHTML = msg;
  fb.style.display = 'block';
}

function nextQ() {
  qIdx++;
  if (qIdx >= TOTAL) { finishGame(); return; }
  loadQ();
}

function finishGame() {
  clearInterval(timerInt);
  saveScore();
  const max = TOTAL * 3;
  const pct = myScore / max;
  document.getElementById('f-pair').textContent = pairName;
  document.getElementById('f-score').textContent = myScore;
  document.getElementById('f-max').textContent = 'out of ' + max + ' points';
  if (pct >= 0.8) { document.getElementById('f-emoji').textContent = '🏆'; document.getElementById('f-title').textContent = 'Excellent!'; }
  else if (pct >= 0.5) { document.getElementById('f-emoji').textContent = '👍'; document.getElementById('f-title').textContent = 'Good job!'; }
  else { document.getElementById('f-emoji').textContent = '💪'; document.getElementById('f-title').textContent = 'Keep practising!'; }
  show('finish');
}

function saveScore() {
  const all = getScores();
  const existing = all.findIndex(e => e.pair === pairName);
  const entry = { pair: pairName, score: myScore, done: true, ts: Date.now() };
  if (existing >= 0) { if (myScore >= all[existing].score) all[existing] = entry; }
  else all.push(entry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

function getScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}

function showBoard() {
  prevScreen = document.querySelector('.screen.active').id.replace('screen-', '');
  loadBoard();
  show('board');
}

function backFromBoard() {
  if (prevScreen === 'finish') show('finish');
  else if (prevScreen === 'register' || !pairName) show('register');
  else show('game');
}

function loadBoard() {
  const all = getScores().sort((a, b) => b.score - a.score);
  const list = document.getElementById('board-list');
  if (all.length === 0) { list.innerHTML = '<div class="empty-board">No scores yet. Be the first!</div>'; return; }
  const medals = ['gold', 'silver', 'bronze'];
  const symbols = ['🥇', '🥈', '🥉'];
  list.innerHTML = all.map((e, i) => {
    const rankClass = i < 3 ? medals[i] : '';
    const rankSym = i < 3 ? symbols[i] : (i + 1) + '.';
    const isMe = e.pair === pairName;
    return '<div class="board-row' + (isMe ? ' me' : '') + '">' +
      '<div class="board-rank ' + rankClass + '">' + rankSym + '</div>' +
      '<div class="board-pair">' + e.pair + (isMe ? ' ★' : '') + '</div>' +
      '<div>' +
        '<div class="board-pts">' + e.score + ' pts</div>' +
        (e.done ? '<div class="board-done">finished</div>' : '') +
      '</div></div>';
  }).join('');
}

document.getElementById('name1').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('name2').focus(); });
document.getElementById('name2').addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
</script>
</body>
</html>
